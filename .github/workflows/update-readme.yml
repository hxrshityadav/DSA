name: "🤖 Project Discipline — AI README Updater"
on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update-readme:
    name: "Generate AI-Powered README"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "📥 Checkout Repository (Full History)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "🐍 Set Up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "📦 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install google-genai
      - name: "✨ Generate AI-Powered README"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_readme.py
      - name: "🚀 Commit and Push Updated README"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "✅ README.md is already up to date. No commit needed."
          else
            git commit -m "docs(readme): 🤖 AI stats update [skip ci]

          Auto-generated by Project Discipline pipeline.
          Triggered by: ${{ github.actor }} @ ${{ github.sha }}"
            git push origin main
            echo "✅ README.md pushed to main."
          fi
